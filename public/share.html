<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Your Memories - PixenzeBooth</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f3e;
            /* game-dark */
            font-family: 'Nunito', sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background-color: #ba1c16;
            /* game-primary */
            border-bottom: 6px solid black;
            box-sizing: border-box;
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #face10;
            /* game-secondary */
            text-shadow: 2px 2px 0 #000;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background-color: white;
            border: 4px solid black;
            border-radius: 16px;
            padding: 16px;
            box-shadow: 6px 6px 0 black;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .media-container {
            width: 100%;
            border: 4px solid black;
            border-radius: 8px;
            overflow: hidden;
            background-color: #ccc;
        }

        img,
        video {
            width: 100%;
            height: auto;
            display: block;
        }

        .btn {
            background-color: #face10;
            color: black;
            border: 4px solid black;
            border-radius: 12px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 900;
            text-decoration: none;
            text-transform: uppercase;
            box-shadow: 4px 4px 0 black;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
            transition: transform 0.1s, box-shadow 0.1s;
            cursor: pointer;
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 black;
        }

        .btn-green {
            background-color: #39ff14;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>PIXENZEBOOTH</h1>
    </div>

    <div class="container" id="content">
        <h2 style="text-align: center; margin: 0;">LOADING MEDIA...</h2>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sid = urlParams.get('id');
        const ext = urlParams.get('ext') || 'mp4';
        const isR2 = urlParams.get('r2') === 'true';
        const content = document.getElementById('content');

        if (!sid) {
            content.innerHTML = '<h2 style="text-align:center;">INVALID LINK</h2>';
        } else {
            const basePath = isR2 ? '/' : '/temp_media/';
            const photoUrl = `${basePath}${sid}_photo.jpg`;
            const videoUrl = `${basePath}${sid}_video.${ext}`;
            const gifUrl = `${basePath}${sid}_gif.gif`;

            content.innerHTML = `
                <h3 style="text-align:center;text-shadow:2px 2px 0 #000;margin:0;">HERE ARE YOUR MEMORIES!</h3>

                <div class="card">
                    <h4 style="margin:0;color:black;font-weight:900;">HIGH-RES PHOTO</h4>
                    <div class="media-container">
                        <img src="${photoUrl}" alt="Photo Strip" onerror="this.parentElement.innerHTML='<div style=\\'padding:20px;text-align:center;color:black;\\'>Not found</div>'" />
                    </div>
                    <a href="${photoUrl}" download="pixenzebooth-photo.jpg" class="btn">DOWNLOAD PHOTO</a>
                </div>

                <div class="card">
                    <h4 style="margin:0;color:black;font-weight:900;">LIVE VIDEO</h4>
                    <div class="media-container">
                        <video src="${videoUrl}" controls playsinline autoplay loop onerror="this.parentElement.innerHTML='<div style=\\'padding:20px;text-align:center;color:black;\\'>Not found</div>'"></video>
                    </div>
                    <a href="${videoUrl}" download="pixenzebooth-video.${ext}" class="btn btn-green">DOWNLOAD VIDEO</a>
                </div>

                <div class="card">
                    <h4 style="margin:0;color:black;font-weight:900;">ANIMATED GIF</h4>
                    <div class="media-container">
                        <img src="${gifUrl}" alt="GIF" onerror="this.parentElement.innerHTML='<div style=\\'padding:20px;text-align:center;color:black;\\'>Not found</div>'" />
                    </div>
                    <a href="${gifUrl}" download="pixenzebooth-gif.gif" class="btn">DOWNLOAD GIF</a>
                </div>
                
                <p style="text-align:center; font-size:12px; margin-top:20px; opacity:0.7;">Thank you for playing!</p>
            `;
        }
    </script>
</body>

</html>
